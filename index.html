
<!-- Dette er en kommentar -->

<!-- Når siden åbnes, tjekker systemet om brugeren er logget ind (via token).
Hvis ja → vis app
Hvis nej → vis login -->



<!DOCTYPE html>                                     <!-- Fortæller browseren at dette er en HTML5 side -->
<html lang="en">                                    <!-- Starer HTML-dokumentet og angiver sprog til engelsk -->

<head>                                              <!-- Indeholder information om hjemmesiden (ikke synligt for brugeren) -->
    <meta charset="UTF-8">                          <!-- Sørger for korrekt visning af tegn (æ, ø, å osv.) -->
    <title>Secure Chat</title>                      <!-- Titel på siden (vises i browser fanen) -->
    <link rel="stylesheet" href="style.css">        <!-- Forbinder HTML med CSS (design/styling) -->
</head>                                             <!-- Slut på head sektionen -->

<body>                                              <!-- Alt det brugeren ser på hjemmesiden -->

    <!-- LOGIN SECTION -->
    <div id="login-section">                        <!-- <div> = en “container” (en boks), id="login-section" = navn på boksen, Container til login området -->

        <h1 id="app-title">AAU Secure Chat</h1>     <!-- Overskrift for login -->
        <h2>Login</h2>                                                

        <input type="text" id="username" placeholder="Username">       <!-- Input felt til username: type="text" → brugeren kan skrive tekst, id="username" → JS bruger den, placeholder → tekst i feltet -->
        <input type="password" id="password" placeholder="Password">   <!-- Input felt til password: type="password" → viser stjerner i stedet for tekst, id="password" → JS bruger den, placeholder → tekst i feltet -->

        <button id="login-btn">Login</button>                          <!-- Login knap som JS bruger til at starte login -->

        <div id="remember-container">                                  <!-- Checkbox til at huske brugerens login -->
            <input type="checkbox" id="remember-me">
            <label for="remember-me">Keep me logged in</label>
        </div>
    </div>


    <!-- MAIN APP -->
    <div id="app" style="display: none;">                                       <!-- Hele appen (skjult indtil login er gennemført) -->


        <!-- SIDEBAR (groups + users) -->
        <div id="sidebar">

            <!-- GROUPS -->
            <h3>Groups</h3>                                                     <!-- Overskrift for grupper -->
            <ul id="group-list"></ul>

            <!-- CREATE GROUP -->
            <input type="text" id="group-name" placeholder="New group name">    <!-- Input felt til at skrive navn på ny gruppe -->
            <button id="create-group-btn">Create</button>                       <!-- Knap til at oprette ny gruppe -->
                
            <!-- USERS -->    
            <h3 style="margin-top: 30px;">Users</h3>
            <ul id="user-list">
                <li>You</li>
                <li>Friend</li>
            </ul>

            <!-- Settings -->
            <div style="margin-top: auto;">
                <button id="theme-toggle">Toggle Theme</button>
            </div>                                                               <!-- sidebar slutter her -->

        </div>                                                                  


        <!-- CHAT AREA -->
        <div id="chat-section">

            <!-- Header -->
            <div id="chat-header">                                                        <!-- Header der viser hvilken gruppe man chatter i -->
                <h3 id="current-group">Select a group</h3>                                <!-- Opdateres dynamisk af JavaScript -->
            </div>

            <!-- Beskeder -->                                                             <!-- Her vises alle chat beskeder -->
            <div id="chat-box">                                                           <!-- JavaScript indsætter beskeder dynamisk -->
                <!-- Messages kommer her -->
            </div>

            <!-- Input -->
            <div id="chat-input">                                                         <!-- Område hvor brugeren skriver og sender beskeder -->

                <input type="text" id="message-input" placeholder="Write message...">     <!-- Input felt til at skrive en besked -->
                <button id="send-btn">Send</button>                                       <!-- Knap til at sende besked -->
            </div>

        </div>

    </div>                           <!-- Slut på app container -->

    <script src="app.js"></script>   <!-- Forbinder HTML med JavaScript (funktionalitet) -->

</body>                              <!-- Slut på body (synligt indhold) -->

</html>                              <!-- Slut på hele HTML dokumentet -->
